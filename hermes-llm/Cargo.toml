[package]
name = "hermes-llm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "LLM inference and model definition (MAL) using Candle; training lives in hermes-train"
keywords = ["llm", "transformer", "deep-learning", "gpt", "inference"]
categories = ["science"]

[dependencies]
# Candle ML framework
candle-core = "0.11"
candle-nn = "0.11"
candle-transformers = "0.11"
candle-flash-attn = { version = "0.11", optional = true }

# Tokenization (fancy-regex instead of onig to avoid objc2 on Linux)
tokenizers = { version = "0.23", default-features = false, features = ["progressbar", "fancy-regex"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Parser for Model Architecture Language (MAL)
pest = "2.8"
pest_derive = "2.8"

# Embed well-known model files
rust-embed = { version = "8", features = ["include-exclude"] }

# CLI and logging
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Utilities
rand = { workspace = true }

# HuggingFace Hub for downloading models/tokenizers (use rustls to avoid openssl)
hf-hub = { version = "1.0", default-features = false, features = ["blocking", "rustls-tls"] }

[dev-dependencies]
tempfile = { workspace = true }

[features]
default = ["cpu"]
cpu = []
cuda = ["candle-core/cuda", "candle-nn/cuda", "candle-transformers/cuda"]
metal = ["candle-core/metal", "candle-nn/metal", "candle-transformers/metal"]
accelerate = ["candle-core/accelerate", "candle-nn/accelerate", "candle-transformers/accelerate"]
flash-attn = ["cuda", "candle-flash-attn"]

[[bin]]
name = "hermes-llm"
path = "src/main.rs"
