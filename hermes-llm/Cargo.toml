[package]
name = "hermes-llm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "LLM inference and model definition (MAL) using Candle; training lives in hermes-train"
keywords = ["llm", "transformer", "deep-learning", "gpt", "inference"]
categories = ["science"]

[dependencies]
# Candle ML framework
candle-core = "0.11"
candle-nn = "0.11"
candle-transformers = "0.11"
candle-flash-attn = { version = "0.11", optional = true }
# Fused Metal selective-scan kernel (docs/metal-selective-scan.md)
candle-metal-kernels = { version = "0.11", optional = true }
objc2-metal = { version = "0.3", optional = true }

# Tokenization (fancy-regex instead of onig to avoid objc2 on Linux)
tokenizers = { version = "0.23", default-features = false, features = ["progressbar", "fancy-regex"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Model Architecture Language (MAL) parser — single source of truth
hermes-mal = { workspace = true }

# CLI and logging
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Error handling
anyhow = { workspace = true }

# Utilities
rand = { workspace = true }

# HuggingFace Hub for downloading models/tokenizers (use rustls to avoid openssl)
hf-hub = { version = "1.0", default-features = false, features = ["blocking", "rustls-tls"] }

# Remote artifact loading (s3://, gs://, http(s)://) — optional `remote` feature
object_store = { version = "0.12", default-features = false, features = ["aws", "gcp", "http"], optional = true }
tokio = { version = "1", default-features = false, features = ["rt"], optional = true }
url = { version = "2", optional = true }
dirs = { version = "6", optional = true }

[dev-dependencies]
tempfile = { workspace = true }

[features]
default = ["cpu", "remote"]
cpu = []
# Load weights/config/tokenizer from s3://, gs://, http(s):// (downloads + caches)
remote = ["dep:object_store", "dep:tokio", "dep:url", "dep:dirs"]
cuda = ["candle-core/cuda", "candle-nn/cuda", "candle-transformers/cuda"]
metal = [
    "candle-core/metal",
    "candle-nn/metal",
    "candle-transformers/metal",
    "dep:candle-metal-kernels",
    "dep:objc2-metal",
]
accelerate = ["candle-core/accelerate", "candle-nn/accelerate", "candle-transformers/accelerate"]
flash-attn = ["cuda", "candle-flash-attn"]

[[bin]]
name = "hermes-llm"
path = "src/main.rs"

[package.metadata.cargo-machete]
# candle-transformers is referenced by the cuda/metal/accelerate feature definitions
ignored = ["candle-transformers"]
