version: "3.9"

services:
  rust-build:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: cargo build --release
    volumes:
      - .:/app
      - rustuser-home:/home/rustuser

  wasm-build:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/hermes-wasm
    command: bash build.sh
    volumes:
      - .:/app
      - rustuser-home:/home/rustuser

volumes:
  rustuser-home: